<nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">

            <!-- Logo & Brand -->
            <div class="flex-shrink-0 flex items-center cursor-pointer" routerLink="/">
                <span class="text-2xl font-bold text-primary tracking-tight">Ecom</span>
            </div>

            <!-- Desktop Search Bar -->
            <div class="hidden md:flex flex-1 items-center justify-center px-8">
                <div class="w-full max-w-lg relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <!-- Search Icon SVG -->
                        <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                    <input type="text"
                        class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg leading-5 bg-gray-50 placeholder-gray-500 focus:outline-none focus:placeholder-gray-400 focus:border-primary focus:ring-1 focus:ring-primary sm:text-sm transition duration-150 ease-in-out"
                        placeholder="Search for products, brands and more..." />
                </div>
            </div>

            <!-- Desktop Actions -->
            <div class="hidden md:flex items-center space-x-6">

                <!-- Categories Dropdown (Simple Hover for now) -->
                <div class="relative group cursor-pointer text-gray-600 hover:text-primary transition-colors">
                    <span class="flex items-center font-medium">
                        Categories
                        <svg *ngIf="isLoadingCategories" class="ml-1 h-4 w-4 animate-spin" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4" />
                        </svg>
                        <svg *ngIf="hasErrorLoadingCategories" class="ml-1 h-4 w-4 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4v2m0-12a9 9 0 110 18 9 9 0 010-18z" />
                        </svg>
                        <svg *ngIf="!isLoadingCategories && !hasErrorLoadingCategories" class="ml-1 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                    </span>
                    <!-- Dropdown Menu -->
                    <div
                        class="absolute left-1/2 transform -translate-x-1/2 mt-2 w-48 bg-white border border-gray-100 rounded-md shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50">
                        <div class="py-1">
                            <div *ngIf="isLoadingCategories" class="px-4 py-2 text-sm text-gray-500">
                                Loading categories...
                            </div>
                            <div *ngIf="hasErrorLoadingCategories" class="px-4 py-3">
                                <p class="text-sm text-red-500 mb-2">Failed to load categories</p>
                                <button (click)="loadCategories()" class="text-xs bg-primary text-white px-2 py-1 rounded hover:bg-primary-dark">
                                    Retry
                                </button>
                            </div>
                            <ng-container *ngIf="!isLoadingCategories && !hasErrorLoadingCategories">
                                <ng-container *ngIf="categories.length > 0; else noCategories">
                                    <a *ngFor="let category of categories" href="#"
                                        class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 hover:text-primary">
                                        {{ category.categoryName }}
                                    </a>
                                </ng-container>
                                <ng-template #noCategories>
                                    <div class="px-4 py-2 text-sm text-gray-500">
                                        No categories available
                                    </div>
                                </ng-template>
                            </ng-container>
                        </div>
                    </div>
                </div>

                <!-- Cart Icon -->
                <button class="relative p-1 text-gray-600 hover:text-primary transition-colors focus:outline-none"
                    title="View your cart">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                    <!-- Badge -->
                    <span
                        class="absolute top-0 right-0 inline-flex items-center justify-center px-1.5 py-0.5 text-xs font-bold leading-none text-white transform translate-x-1/4 -translate-y-1/4 bg-accent rounded-full">
                        0
                    </span>
                </button>

                <!-- Dynamic Auth Buttons -->
                <!-- TODO: Add logic to switch between Login/Signup and User Profile based on Auth State -->
                <div class="flex items-center space-x-3">
                    <a routerLink="/auth/login"
                        class="text-sm font-medium text-gray-700 hover:text-primary transition-colors">
                        Login
                    </a>
                    <a routerLink="/auth/signup"
                        class="px-4 py-2 text-sm font-medium text-white bg-primary hover:bg-primary-dark rounded-md shadow-sm transition-colors duration-200">
                        Sign Up
                    </a>
                </div>

            </div>

            <!-- Mobile Menu Button -->
            <div class="flex items-center md:hidden">
                <button (click)="toggleMobileMenu()"
                    class="inline-flex items-center justify-center p-2 rounded-md text-gray-400 hover:text-gray-500 hover:bg-gray-100 focus:outline-none focus:bg-gray-100 focus:text-gray-500 transition duration-150 ease-in-out">
                    <svg class="h-6 w-6" stroke="currentColor" fill="none" viewBox="0 0 24 24">
                        <path [class.hidden]="isMobileMenuOpen" [class.block]="!isMobileMenuOpen" class="block"
                            stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />
                        <path [class.hidden]="!isMobileMenuOpen" [class.block]="isMobileMenuOpen" class="hidden"
                            stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Mobile Menu -->
    <div [class.hidden]="!isMobileMenuOpen" class="hidden md:hidden bg-white border-t border-gray-100">
        <div class="pt-2 pb-3 px-2 space-y-1">
            <div class="px-2 mb-2">
                <input type="text"
                    class="block w-full px-3 py-2 border border-gray-300 rounded-md leading-5 bg-gray-50 placeholder-gray-500 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary sm:text-sm"
                    placeholder="Search..." />
            </div>
            <div *ngIf="isLoadingCategories" class="px-3 py-2 text-sm text-gray-500">
                Loading categories...
            </div>
            <div *ngIf="hasErrorLoadingCategories" class="px-3 py-3">
                <p class="text-sm text-red-500 mb-2">Failed to load categories</p>
                <button (click)="loadCategories()" class="text-xs bg-primary text-white px-2 py-1 rounded hover:bg-primary-dark">
                    Retry
                </button>
            </div>
            <ng-container *ngIf="!isLoadingCategories && !hasErrorLoadingCategories">
                <ng-container *ngIf="categories.length > 0; else noCategoriesMobile">
                    <a *ngFor="let category of categories" href="#"
                        class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 hover:text-gray-900 hover:bg-gray-50">
                        {{ category.categoryName }}
                    </a>
                </ng-container>
                <ng-template #noCategoriesMobile>
                    <div class="px-3 py-2 text-sm text-gray-500">
                        No categories available
                    </div>
                </ng-template>
            </ng-container>
        </div>
        <div class="pt-4 pb-4 border-t border-gray-200">
            <div class="flex items-center px-4 space-x-3">
                <a routerLink="/auth/login"
                    class="block px-3 py-2 rounded-md text-base font-medium text-gray-500 hover:text-gray-800 hover:bg-gray-100 w-full text-center">Login</a>
                <a routerLink="/auth/signup"
                    class="block px-3 py-2 rounded-md text-base font-medium text-white bg-primary hover:bg-primary-dark w-full text-center">Sign
                    Up</a>
            </div>
        </div>
    </div>
</nav>
